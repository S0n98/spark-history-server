apiVersion: v1
kind: Pod
metadata:
  name: spark-test-job
  namespace: default
spec:
  restartPolicy: Never
  containers:
    - name: spark
      image: apache/spark:3.5.1
      command:
        - /bin/bash
        - -c
        - |
          wget -q -O /opt/spark/jars/hadoop-aws-3.3.4.jar https://repo1.maven.org/maven2/org/apache/hadoop/hadoop-aws/3.3.4/hadoop-aws-3.3.4.jar
          wget -q -O /opt/spark/jars/aws-java-sdk-bundle-1.12.262.jar https://repo1.maven.org/maven2/com/amazonaws/aws-java-sdk-bundle/1.12.262/aws-java-sdk-bundle-1.12.262.jar
          ls -la /opt/spark/jars/hadoop-aws* /opt/spark/jars/aws-java*

          /opt/spark/bin/spark-submit \
            --master "local[2]" \
            --class org.apache.spark.examples.SparkPi \
            --conf spark.eventLog.enabled=true \
            --conf spark.eventLog.dir=s3a://spark-logs/events \
            --conf spark.hadoop.fs.s3a.endpoint=http://minio.default.svc.cluster.local:80 \
            --conf spark.hadoop.fs.s3a.access.key=minio \
            --conf spark.hadoop.fs.s3a.secret.key=minio123 \
            --conf spark.hadoop.fs.s3a.path.style.access=true \
            --conf spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem \
            --conf spark.hadoop.fs.s3a.connection.ssl.enabled=false \
            --conf spark.driver.memory=512m \
            local:///opt/spark/examples/jars/spark-examples_2.12-3.5.1.jar 100
      securityContext:
        runAsUser: 0
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 2000m
          memory: 2Gi
