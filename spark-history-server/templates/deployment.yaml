apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spark-history-server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spark-history-server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "spark-history-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "spark-history-server.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "spark-history-server.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}

      # ── Init containers ───────────────────────────────────────────────────
      {{- if or .Values.persistence.enabled .Values.extraInitContainers }}
      initContainers:
        {{- if .Values.persistence.enabled }}
        - name: init-log-dir
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["sh", "-c", "mkdir -p {{ .Values.persistence.mountPath }}"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: spark-logs
              mountPath: {{ .Values.persistence.mountPath }}
        {{- end }}
        {{- with .Values.extraInitContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}

      containers:
        - name: spark-history-server
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /opt/spark/bin/spark-class
            - org.apache.spark.deploy.history.HistoryServer
          ports:
            - name: http
              containerPort: 18080
              protocol: TCP
          env:
            - name: SPARK_CONF_DIR
              value: /opt/spark/conf
            - name: SPARK_NO_DAEMONIZE
              value: "true"
            {{- if and .Values.s3.enabled .Values.s3.credentialsSecret }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.credentialsSecret }}
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.credentialsSecret }}
                  key: AWS_SECRET_ACCESS_KEY
            {{- end }}
            {{- with .Values.extraEnvVars }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: spark-conf
              mountPath: /opt/spark/conf/spark-defaults.conf
              subPath: spark-defaults.conf
              readOnly: true
            {{- if .Values.hadoopConf }}
            - name: spark-conf
              mountPath: /opt/spark/conf/core-site.xml
              subPath: core-site.xml
              readOnly: true
            {{- end }}
            - name: tmp
              mountPath: /tmp
            {{- if .Values.persistence.enabled }}
            - name: spark-logs
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            {{- if and .Values.gcs.enabled .Values.gcs.credentialsSecret }}
            - name: gcs-credentials
              mountPath: {{ .Values.gcs.credentialsMountPath }}
              readOnly: true
            {{- end }}
            {{- range .Values.extraConfigMaps }}
            - name: cm-{{ .name }}
              mountPath: {{ .mountPath }}
              readOnly: true
            {{- end }}
            {{- range .Values.extraSecrets }}
            - name: secret-{{ .name }}
              mountPath: {{ .mountPath }}
              readOnly: true
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

      volumes:
        - name: spark-conf
          configMap:
            name: {{ include "spark-history-server.fullname" . }}-conf
        - name: tmp
          emptyDir: {}
        {{- if .Values.persistence.enabled }}
        - name: spark-logs
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-logs" (include "spark-history-server.fullname" .)) }}
        {{- end }}
        {{- if and .Values.gcs.enabled .Values.gcs.credentialsSecret }}
        - name: gcs-credentials
          secret:
            secretName: {{ .Values.gcs.credentialsSecret }}
        {{- end }}
        {{- range .Values.extraConfigMaps }}
        - name: cm-{{ .name }}
          configMap:
            name: {{ .name }}
        {{- end }}
        {{- range .Values.extraSecrets }}
        - name: secret-{{ .name }}
          secret:
            secretName: {{ .name }}
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
