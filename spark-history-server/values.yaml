# Default values for spark-history-server

# -- Number of replicas
replicaCount: 1

image:
  # -- Docker image repository
  repository: apache/spark
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Overrides the image tag. Defaults to chart appVersion.
  tag: ""

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Override the chart name
nameOverride: ""
# -- Override the full resource name
fullnameOverride: ""

serviceAccount:
  # -- Create a service account
  create: true
  # -- Annotations to add to the service account (e.g. for IRSA / Workload Identity)
  annotations: {}
  # -- Name override. Defaults to the chart fullname.
  name: ""

# -- Annotations applied to the Pod
podAnnotations: {}

# -- Labels applied to the Pod
podLabels: {}

# -- Pod security context
podSecurityContext:
  fsGroup: 185
  runAsUser: 185
  runAsNonRoot: true

# -- Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  # -- Service type
  type: ClusterIP
  # -- HTTP port for the history server UI
  port: 18080

ingress:
  # -- Enable ingress
  enabled: false
  # -- Ingress class name
  className: ""
  # -- Ingress annotations
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: spark-history.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: spark-history-tls
  #    hosts:
  #      - spark-history.example.com

resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 200m
    memory: 512Mi

# -- Startup probe configuration (prevents liveness from killing slow-starting JVMs)
startupProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 20

# -- Liveness probe configuration
livenessProbe:
  httpGet:
    path: /
    port: http
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

# -- Readiness probe configuration
readinessProbe:
  httpGet:
    path: /
    port: http
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# -- Extra init containers to run before the main container
extraInitContainers: []
# - name: download-jars
#   image: busybox:1.36
#   command: ["sh", "-c", "wget -P /extra-jars/ http://example.com/my.jar"]
#   volumeMounts:
#     - name: extra-jars
#       mountPath: /extra-jars

# -- Additional volumes to mount on the Pod
volumes: []
# -- Additional volume mounts on the main container
volumeMounts: []

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity rules
affinity: {}

# -- Extra environment variables injected into the container
extraEnvVars: []
# - name: SOME_VAR
#   value: "some-value"

# -- Reference environment variables from ConfigMaps or Secrets
extraEnvFrom: []
# - secretRef:
#     name: my-secret

# ── Spark History Server configuration ──────────────────────────────────────

sparkConf:
  # -- Path where Spark event logs are stored (required)
  # For S3:  s3a://my-bucket/spark-logs
  # For GCS: gs://my-bucket/spark-logs
  # For HDFS: hdfs://namenode:8020/spark-logs
  # For local PVC: file:///mnt/spark-logs
  "spark.history.fs.logDirectory": "file:///mnt/spark-logs"
  # For S3/MinIO: use a subdirectory path (not bucket root) to avoid
  # hadoop-aws 3.3.4 S3Guard path resolution issues with MinIO

  # -- How often (seconds) to reload the list of incomplete applications
  "spark.history.fs.update.interval": "10s"

  # -- Max number of applications listed on the UI
  "spark.history.ui.maxApplications": "50"

  # -- Retain at most N completed applications in memory
  "spark.history.retainedApplications": "50"

  # -- Cleaner: auto-delete old logs
  "spark.history.fs.cleaner.enabled": "false"
  "spark.history.fs.cleaner.interval": "1d"
  "spark.history.fs.cleaner.maxAge": "7d"

  # -- Kerberos (uncomment if needed)
  # "spark.history.kerberos.enabled": "true"
  # "spark.history.kerberos.principal": "spark/_HOST@REALM"
  # "spark.history.kerberos.keytab": "/etc/security/keytab/spark.keytab"

# ── Storage back-end options (choose one) ───────────────────────────────────

# Local / PVC storage
persistence:
  # -- Enable a PVC for local event log storage
  enabled: false
  # -- StorageClass name. "" uses the cluster default.
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 20Gi
  # -- Mount path inside the container
  mountPath: /mnt/spark-logs
  # -- Use an existing PVC instead of creating one
  existingClaim: ""

# AWS S3 configuration
s3:
  # -- Enable S3 event log storage
  enabled: false
  # -- S3 endpoint (leave blank for AWS; set for MinIO / Ceph)
  endpoint: ""
  # -- Use path-style access (required for MinIO)
  pathStyleAccess: false
  # -- Name of a Kubernetes Secret containing AWS_ACCESS_KEY_ID and
  #    AWS_SECRET_ACCESS_KEY (leave blank to use IRSA / instance profile)
  credentialsSecret: ""
  # -- Extra hadoop-aws / s3a Spark config entries
  extraConf: {}
  # "spark.hadoop.fs.s3a.impl": "org.apache.hadoop.fs.s3a.S3AFileSystem"
  # "spark.hadoop.fs.s3a.aws.credentials.provider": "com.amazonaws.auth.WebIdentityTokenCredentialsProvider"

# GCS configuration
gcs:
  # -- Enable GCS event log storage
  enabled: false
  # -- Name of a Kubernetes Secret containing the GCS service-account JSON key
  #    (key must be named "key.json"). Leave blank to use Workload Identity.
  credentialsSecret: ""
  # -- Path inside the container where the key is mounted
  credentialsMountPath: /etc/gcs

# ── Hadoop configuration (merged into core-site.xml / hdfs-site.xml) ────────
hadoopConf: {}
# "fs.s3a.endpoint": "s3.us-east-1.amazonaws.com"

# ── Extra ConfigMaps / Secrets to project into the Pod ──────────────────────
extraConfigMaps: []
# - name: my-hadoop-conf
#   mountPath: /opt/spark/conf/hadoop

extraSecrets: []
# - name: my-keytab
#   mountPath: /etc/security/keytab

# ── RBAC ─────────────────────────────────────────────────────────────────────
rbac:
  # -- Create a ClusterRole that lets the history server read Pod logs (optional)
  create: false
